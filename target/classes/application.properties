# H2 File-based Database (Persistent - Data save rahega)
spring.datasource.url=jdbc:h2:file:./society_db
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# H2 Console (For debugging)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# PostgreSQL Database (Production - Uncomment when PostgreSQL is installed)
# spring.datasource.url=jdbc:postgresql://localhost:5432/society_db
# spring.datasource.username=postgres
# spring.datasource.password=postgres
# spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.defer-datasource-initialization=false

# HikariCP Connection Pooling (For 10,000+ users)
spring.datasource.hikari.maximum-pool-size=50
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-test-query=SELECT 1

# SQL Initialization - DISABLED
# spring.sql.init.mode=always
# spring.sql.init.data-locations=classpath:data.sql

# JWT Configuration
jwt.secret=mySecretKey123456789012345678901234567890
jwt.expiration=86400000

# Cache Configuration (Spring Cache)
spring.cache.type=simple
spring.cache.cache-names=users,roles,permissions

# CORS Configuration
spring.web.cors.allowed-origins=*
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=false

# Server Configuration
server.port=8080

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
