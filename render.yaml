services:
  - type: web
    name: nivas-backend
    env: java
    plan: free
    region: oregon
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/society-management-0.0.1-SNAPSHOT.jar
    envVars:
      - key: SPRING_DATASOURCE_URL
        value: jdbc:postgresql://dpg-d7mqoii8qa3s739ru2b0-a/nivas_db
      - key: SPRING_DATASOURCE_USERNAME
        value: nivas_user
      - key: SPRING_DATASOURCE_PASSWORD
        value: 8ay0zupbOoXoRokLMuhy3I1DsIqhvKhn
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: update
      - key: SPRING_JPA_DATABASE_PLATFORM
        value: org.hibernate.dialect.PostgreSQLDialect
      - key: SPRING_JPA_SHOW_SQL
        value: "false"
      - key: SPRING_DATASOURCE_DRIVER_CLASS_NAME
        value: org.postgresql.Driver
      - key: JWT_SECRET
        value: nivas-secret-key-2024-very-secure
      - key: JWT_EXPIRATION
        value: "86400000"

databases:
  - name: nivas-db
    databaseName: nivas_db
    user: nivas_user
    plan: free
